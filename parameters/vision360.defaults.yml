  "detectors": {
    "os_time_source": {
      "preferred_evidence": [],
      "preferred_path_hints": [],
      "patterns": [
        {
          "rule_id": "System.currentTimeMillis",
          "regex": "\\bSystem\\.currentTimeMillis\\s*\\("
        },
        {
          "rule_id": "SystemClock.elapsedRealtime",
          "regex": "\\bSystemClock\\.elapsedRealtime\\s*\\("
        },
        {
          "rule_id": "SystemClock.uptimeMillis",
          "regex": "\\bSystemClock\\.uptimeMillis\\s*\\("
        },
        {
          "rule_id": "Instant.now",
          "regex": "\\bInstant\\.now\\s*\\("
        },
        {
          "rule_id": "LocalDateTime.now",
          "regex": "\\bLocalDateTime\\.now\\s*\\("
        },
        {
          "rule_id": "Calendar.getInstance",
          "regex": "\\bCalendar\\.getInstance\\s*\\("
        },
        {
          "rule_id": "new Date",
          "regex": "\\bnew\\s+Date\\s*\\("
        },
        {
          "rule_id": "OffsetDateTime.now",
          "regex": "\\bOffsetDateTime\\.now\\s*\\("
        },
        {
          "rule_id": "ZonedDateTime.now",
          "regex": "\\bZonedDateTime\\.now\\s*\\("
        },
        {
          "rule_id": "DateUtils.convertTime(System.currentTimeMillis)",
          "regex": "\\bconvertTime\\s*\\(\\s*System\\.currentTimeMillis\\s*\\("
        }
      ]
    },
    "password_hashing": {
      "preferred_path_hints": [],
      "kdf_patterns": [
        {
          "algorithm": "bcrypt",
          "regex": "\\bBCrypt\\s*\\.\\s*hashpw\\s*\\("
        },
        {
          "algorithm": "bcrypt",
          "regex": "\\bBCrypt\\s*\\.\\s*gensalt\\s*\\("
        },
        {
          "algorithm": "pbkdf2",
          "regex": "PBKDF2WithHmacSHA\\d+"
        },
        {
          "algorithm": "pbkdf2",
          "regex": "\\bSecretKeyFactory\\s*\\.\\s*getInstance\\s*\\(\\s*\\\"PBKDF2"
        },
        {
          "algorithm": "scrypt",
          "regex": "\\bscrypt\\b"
        },
        {
          "algorithm": "argon2",
          "regex": "\\bargon2\\b"
        },
        {
          "algorithm": "bcrypt",
          "regex": "\\bBCryptPasswordEncoder\\b"
        },
        {
          "algorithm": "pbkdf2",
          "regex": "\\bPBEKeySpec\\b"
        }
      ],
      "salt_patterns": [
        {
          "algorithm": "bcrypt_salt",
          "regex": "\\bBCrypt\\s*\\.\\s*gensalt\\s*\\("
        },
        {
          "algorithm": "salt_var",
          "regex": "\\bsalt\\s*=\\s*"
        },
        {
          "algorithm": "secure_random_salt",
          "regex": "\\bSecureRandom\\b.*\\bnextBytes\\s*\\("
        }
      ]
    },
    "logout_session": {
      "path_hints": [],
      "logout_method_patterns": [
        "void logout\\s*\\(",
        "public void logout\\s*\\(",
        "\\bshowLogoutDialog\\s*\\("
      ],
      "local_cleanup_patterns": [
        "clearuserpreferencesdata\\s*\\(",
        "clear.*session",
        "clear.*preferences",
        "logout.*clear",
        "\\bremove\\s*\\(\\s*ApplicationConstants\\.[A-Za-z0-9_\\.]+\\s*\\)",
        "\\bmoveToLoginActivity\\s*\\("
      ],
      "cookie_cleanup_patterns": [
        "removeallcookies",
        "clearcookies",
        "CookieManager\\.getInstance\\(\\)\\.removeAllCookies",
        "\\bdeleteAllCookies\\b",
        "\\bclearCookie[s]?\\b"
      ],
      "session_cookie_patterns": [
        "jsessionid",
        "sessionid",
        "CookieManager\\.getInstance\\(\\)\\.setCookie",
        "CookieHandler\\.setDefault"
      ],
      "logout_endpoint_patterns": [
        "\\\"/logout\\\"",
        "'/logout'"
      ]
    },
    "endpoint_auth": {
      "path_hints": [],
      "basic_auth_patterns": [
        "\\.header\\(\\s*\\\"Authorization\\\"\\s*,\\s*basic\\s*\\)",
        "Basic\\s+[A-Za-z0-9+/=]+",
        "\\.addHeader\\(\\s*\\\"Authorization\\\"\\s*,",
        "setRequestProperty\\(\\s*\\\"Authorization\\\"\\s*,"
      ],
      "any_authorization_patterns": [
        "\\\"Authorization\\\"",
        "authorization\\s*:",
        "bearer",
        "basic",
        "\\.addHeader\\(\\s*\\\"Authorization\\\"",
        "setRequestProperty\\(\\s*\\\"Authorization\\\"",
        "\\baddNetworkInterceptor\\b",
        "\\baddInterceptor\\b"
      ]
